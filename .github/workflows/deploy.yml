name: Deploy (sem Easypanel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (Easypanel workaround)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="/opt/palanca/whatsapp-bo"
            REPO_URL="https://github.com/dariomilagre8-bot/whatsapp-bo.git"

            mkdir -p /opt/palanca

            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git pull
            else
              if [ -e "$REPO_DIR" ]; then
                rm -rf "$REPO_DIR"
              fi
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            # Mesmo Dockerfile na raiz; ACTIVE_CLIENT e restantes env vêm dos serviços Swarm.
            docker build -t easypanel/jules/whatssiru:latest .
            docker build -t easypanel/jules/demo-moda:latest .

            # whatssiru: host-mode port 8080 — sem --force; reescala.
            docker service scale jules_whatssiru=0
            sleep 5
            docker service scale jules_whatssiru=1
            sleep 10

            # demo-moda: sem host-mode — update normal.
            docker service update --image easypanel/jules/demo-moda:latest jules_demo-moda
            sleep 10

            curl -sf https://jules-whatssiru.oxuzyt.easypanel.host/health || echo "WARN: whatssiru health failed"
            curl -sf https://jules-demo-moda.oxuzyt.easypanel.host/health || echo "WARN: demo-moda health failed"
