name: PA QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:legacy
      - run: npx jest --testPathPattern=unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx jest --testPathPattern=integration
        env:
          REDIS_URL: redis://127.0.0.1:6379/1

  flows:
    runs-on: ubuntu-latest
    needs: integration
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx jest --testPathPattern=flows
        env:
          REDIS_URL: redis://127.0.0.1:6379/1
